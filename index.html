<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invernadero M.10 · Tomate Cherry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --verde: #2d6a2d;
    --verde-claro: #4caf50;
    --verde-neon: #7ec850;
    --amarillo: #f5c842;
    --rojo: #e53935;
    --blanco: #f9fbf7;
    --gris: #1a1f1a;
    --card-bg: rgba(255,255,255,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gris);
    color: var(--blanco);
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── PANTALLA CAMARA ── */
  #screen-camera {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background: #000;
  }

  #header-cam {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 20px 20px 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,.75) 0%, transparent 100%);
    text-align: center;
  }
  #header-cam h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--verde-neon);
    line-height: 1;
  }
  #header-cam p {
    font-size: .75rem;
    color: rgba(255,255,255,.6);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  #overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .qr-frame {
    width: 220px; height: 220px;
    position: relative;
  }
  .qr-frame::before, .qr-frame::after,
  .qr-frame span::before, .qr-frame span::after {
    content: '';
    position: absolute;
    width: 36px; height: 36px;
    border-color: var(--verde-neon);
    border-style: solid;
  }
  .qr-frame::before  { top: 0;    left: 0;  border-width: 3px 0 0 3px; }
  .qr-frame::after   { top: 0;    right: 0; border-width: 3px 3px 0 0; }
  .qr-frame span::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }
  .qr-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  .scan-line {
    position: absolute; top: 0; left: 4px; right: 4px; height: 2px;
    background: linear-gradient(to right, transparent, var(--verde-neon), transparent);
    animation: scan 2s linear infinite;
    box-shadow: 0 0 8px var(--verde-neon);
  }
  @keyframes scan { 0%{top:0} 100%{top:100%} }

  #cam-hint {
    position: absolute; bottom: 50px; left: 0; right: 0;
    text-align: center;
    font-size: .8rem;
    color: rgba(255,255,255,.55);
    letter-spacing: 1px;
  }

  /* ── PANTALLA BIENVENIDA ── */
  #screen-welcome {
    display: none;
    position: fixed; inset: 0;
    flex-direction: column;
    background: linear-gradient(160deg, #0d1f0d 0%, #1a2e14 50%, #0f1a0f 100%);
    overflow-y: auto;
    padding-bottom: 30px;
  }
  #screen-welcome.active { display: flex; }

  .welcome-top {
    padding: 36px 24px 20px;
    text-align: center;
    position: relative;
  }
  .welcome-top::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--verde-neon), transparent);
    margin-top: 20px;
  }

  .badge {
    display: inline-block;
    background: rgba(126,200,80,.12);
    border: 1px solid rgba(126,200,80,.3);
    border-radius: 40px;
    padding: 4px 14px;
    font-size: .68rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--verde-neon);
    margin-bottom: 14px;
  }

  .welcome-top h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1.05;
    letter-spacing: 2px;
  }
  .welcome-top h2 span { color: var(--verde-neon); }

  .welcome-top .subtitulo {
    font-size: .85rem;
    color: rgba(255,255,255,.55);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .question-row {
    margin: 0 24px;
    padding: 16px 20px;
    background: rgba(126,200,80,.07);
    border-left: 3px solid var(--verde-neon);
    border-radius: 0 10px 10px 0;
  }
  .question-row p {
    font-size: .72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--verde-neon);
    margin-bottom: 2px;
  }
  .question-row h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: var(--blanco);
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 24px 0;
  }

  .btn-task {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px;
    padding: 18px 12px;
    text-align: center;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s ease;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    min-height: 90px;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }
  .btn-task::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(126,200,80,.15), transparent);
    opacity: 0;
    transition: opacity .18s;
  }
  .btn-task:active::before { opacity: 1; }
  .btn-task:active { transform: scale(.96); border-color: var(--verde-neon); }

  .btn-task .icon { font-size: 1.6rem; }

  .btn-finish {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--rojo) 0%, #b71c1c 100%);
    border: none;
    border-radius: 14px;
    padding: 20px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: transform .18s, box-shadow .18s;
    box-shadow: 0 4px 20px rgba(229,57,53,.4);
  }
  .btn-finish:active { transform: scale(.97); }

  /* ── FLASH ── */
  #flash {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none;
    transition: opacity .1s;
    z-index: 100;
  }
  #flash.pop { opacity: .7; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(30,50,20,.95);
    border: 1px solid var(--verde-neon);
    color: var(--blanco);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: .82rem;
    white-space: nowrap;
    opacity: 0;
    transition: all .3s;
    z-index: 200;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- FLASH -->
<div id="flash"></div>
<!-- TOAST -->
<div id="toast"></div>

<!-- PANTALLA CÁMARA -->
<div id="screen-camera">
  <div id="header-cam">
    <h1>INVERNADERO M.10</h1>
    <p>Tomate Cherry · Control de Acceso</p>
  </div>
  <video id="video" playsinline autoplay muted></video>
  <div id="overlay">
    <div class="qr-frame"><span></span>
      <div class="scan-line"></div>
    </div>
  </div>
  <div id="cam-hint">📷 Apunta el QR de tu tarjeta</div>
</div>

<!-- PANTALLA BIENVENIDA -->
<div id="screen-welcome">
  <div class="welcome-top">
    <div class="badge">🌿 Invernadero M.10</div>
    <h2>¡HOLA, <span id="nombre-empleado">EMPLEADO</span>!</h2>
    <p class="subtitulo">Bienvenido al Invernadero M.10<br>Tomate Cherry</p>
  </div>

  <div class="question-row">
    <p>Registro de actividad</p>
    <h3>¿QUÉ VAS A HACER HOY?</h3>
  </div>

  <div class="btn-grid">
    <button class="btn-task" onclick="registrar('Manejo de Cultivo')">
      <span class="icon">🌱</span>Manejo de Cultivo
    </button>
    <button class="btn-task" onclick="registrar('Polinizaciones')">
      <span class="icon">🐝</span>Polinizaciones
    </button>
    <button class="btn-task" onclick="registrar('Preparación Invernadero')">
      <span class="icon">🏗️</span>Preparación Invernadero
    </button>
    <button class="btn-task" onclick="registrar('Limpieza de Invernadero')">
      <span class="icon">🧹</span>Limpieza de Invernadero
    </button>
    <button class="btn-task" onclick="registrar('Muestras')">
      <span class="icon">🔬</span>Muestras
    </button>
    <button class="btn-task" onclick="registrar('Scouting')">
      <span class="icon">🔍</span>Scouting
    </button>
    <button class="btn-finish" onclick="terminar()">
      ✅ &nbsp;HE TERMINADO
    </button>
  </div>
</div>

<!-- jsQR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  const video     = document.getElementById('video');
  const screenCam = document.getElementById('screen-camera');
  const screenWel = document.getElementById('screen-welcome');
  const nombreEl  = document.getElementById('nombre-empleado');
  const flash     = document.getElementById('flash');
  const toast     = document.getElementById('toast');

  let scanning = false;
  let canvas, ctx;
  let currentNombre = '';

  /* ── SONIDO BIENVENIDA (Web Audio API) ── */
  function playBienvenida() {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // Do Mi Sol Do8
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.14);
      gain.gain.setValueAtTime(0.22, ac.currentTime + i * 0.14);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.14 + 0.35);
      osc.start(ac.currentTime + i * 0.14);
      osc.stop(ac.currentTime + i * 0.14 + 0.35);
    });
  }

  function playClick() {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start(); osc.stop(ac.currentTime + 0.15);
  }

  /* ── FLASH VISUAL ── */
  function doFlash() {
    flash.classList.add('pop');
    setTimeout(() => flash.classList.remove('pop'), 120);
  }

  /* ── TOAST ── */
  function showToast(msg, ms = 2200) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), ms);
  }

  /* ── INICIO CÁMARA (selfie) ── */
  async function startCamera() {
    screenCam.style.display = 'flex';
    screenWel.classList.remove('active');
    scanning = false;

    try {
      // Detener stream anterior si existe
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      if (!canvas) {
        canvas = document.createElement('canvas');
        ctx = canvas.getContext('2d', { willReadFrequently: true });
      }

      scanning = true;
      requestAnimationFrame(scanFrame);
    } catch (err) {
      showToast('⚠️ No se pudo acceder a la cámara');
      console.error(err);
    }
  }

  /* ── SCAN QR ── */
  function scanFrame() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
      if (code && code.data.trim()) {
        scanning = false;
        video.srcObject?.getTracks().forEach(t => t.stop());
        onQRDetected(code.data.trim());
        return;
      }
    }
    requestAnimationFrame(scanFrame);
  }

  /* ── QR DETECTADO ── */
  function onQRDetected(nombre) {
    doFlash();
    playBienvenida();
    currentNombre = nombre.toUpperCase();
    nombreEl.textContent = currentNombre;
    screenCam.style.display = 'none';
    screenWel.classList.add('active');
    screenWel.scrollTop = 0;
  }

  /* ── BOTONES TAREA ── */
  function registrar(tarea) {
    playClick();
    showToast(`✅ Registrado: ${tarea}`);
    console.log(`[${new Date().toLocaleTimeString()}] ${currentNombre} → ${tarea}`);
  }

  /* ── HE TERMINADO ── */
  function terminar() {
    playClick();
    showToast(`👋 ¡Hasta luego, ${currentNombre}!`);
    setTimeout(() => startCamera(), 1400);
  }

  /* ── ARRANQUE ── */
  startCamera();
</script>
</body>
</html>
